minimum_pre_commit_version: '3.3.2'
default_install_hook_types:
  - pre-push
  - pre-commit
  - post-checkout
  - post-merge
  - post-commit
default_stages:
  - pre-commit
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Ruff version.
    rev: v0.15.8
    hooks:
      # Run the linter.
      - id: ruff-check
        args: [ --select, I, --fix ]
      # Run the formatter.
      - id: ruff-format
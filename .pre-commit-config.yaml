minimum_pre_commit_version: '3.3.2'
default_install_hook_types:
  - pre-push
  - pre-commit
  - post-checkout
  - post-merge
  - post-commit
default_stages:
  - pre-commit
repos:
  - repo: local
    hooks:
      - id: uv-freeze-test
        name: Run uv freeze - tests
        entry: bash -c "uv export --no-hashes --only-group test > ./tests/backend/requirements.txt"
        language: system
        always_run: true
  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Ruff version.
    rev: v0.15.8
    hooks:
      # Run the linter.
      - id: ruff-check
        args: [ --select, I, --fix ]
      # Run the formatter.
      - id: ruff-format
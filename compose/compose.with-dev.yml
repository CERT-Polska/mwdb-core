# Enables development environment with auto-reload
services:
  mwdb:
    image: !reset null
    environment:
      HOT_RELOAD: 1
      MWDB_MAIL_SMTP: "mailhog:1025"
      MWDB_MAIL_FROM: "noreply@mwdb.dev"
      MWDB_RECAPTCHA_SITE_KEY: "6LeIxAcTAAAAAJcZVRqyHh71UMIEGNQ_MXjiZKhI"
      MWDB_RECAPTCHA_SECRET: "6LeIxAcTAAAAAGG-vFI1TnRWxMZNFuojJ4WifJWe"
      MWDB_ENABLE_REGISTRATION: 1
      MWDB_ENABLE_PROMETHEUS_METRICS: 1
    volumes:
      - "./docker/mail_templates:/app/mail_templates"
      - "./mwdb:/app/mwdb"
      - "./docker/plugins:/app/plugins"
  mwdb-web:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile-web-dev
    image: !reset null
    ports: !override
      - "80:3000"
    healthcheck:
      test: "wget -qO - 'http://127.0.0.1:3000' || exit 1"
    environment:
      HOST: 0.0.0.0
      NODE_ENV: development
      # Uncomment this to enable Extendable debug boxes
      # See also https://github.com/CERT-Polska/mwdb-core/pull/1182
      # VITE_EXTENDABLE_DEBUG_BOX: 1
  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "127.0.0.1:8025:8025"
services:
  minio:
    image: minio/minio
    entrypoint: sh
    command: -c "mkdir -p /data/mwdb /data/karton && minio server --address 0.0.0.0:9000 /data"
    volumes:
      - /tmp/minio:/data
    ports:
      - "127.0.0.1:9000:9000"
    healthcheck:
      test: timeout 5s bash -c ':> /dev/tcp/127.0.0.1/9000' || exit 1
      interval: 5s
      timeout: 5s
      retries: 3
    environment:
      - MINIO_ROOT_USER=mwdb-test-access
      - MINIO_ROOT_PASSWORD=mwdb-test-key
  mwdb:
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MWDB_STORAGE_PROVIDER: s3
      MWDB_S3_STORAGE_ENDPOINT: "minio:9000"
      MWDB_S3_STORAGE_ACCESS_KEY: "mwdb-test-access"
      MWDB_S3_STORAGE_SECRET_KEY: "mwdb-test-key"
      MWDB_S3_STORAGE_BUCKET_NAME: "mwdb"